name: Go CI

on:
  push:
    branches: [main, go-rewrite]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Run tests with race detector
        run: go test -race -coverprofile=cover.out -covermode=atomic ./...

      - name: Print coverage
        run: go tool cover -func=cover.out | grep total

  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm
            goarm: "6"
            suffix: arm6
          - goos: linux
            goarch: arm64
            goarm: ""
            suffix: arm64
          - goos: linux
            goarch: amd64
            goarm: ""
            suffix: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.BuildCommit=${COMMIT}" \
            -o logfalcon-${{ matrix.suffix }} ./cmd/logfalcon

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logfalcon-${{ matrix.suffix }}
          path: logfalcon-${{ matrix.suffix }}
          retention-days: 1

  release:
    name: Release
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/logfalcon-*
          generate_release_notes: true
