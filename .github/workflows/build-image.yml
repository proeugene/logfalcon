name: Build SD Card Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload image as workflow artifact (useful for testing)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Install QEMU for ARM emulation
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Clone pi-gen
        run: git clone --depth 1 --branch bookworm https://github.com/RPi-Distro/pi-gen.git pi-gen/pi-gen-repo

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Cross-compile logfalcon for ARM
        run: |
          make build-pi
          make build-pi2
          # Fallback binary for QEMU chroot where uname -m returns host arch
          cp bin/logfalcon-arm6 bin/logfalcon
          ls -la bin/

      - name: Configure pi-gen
        run: |
          # Copy our config and custom stage
          cp pi-gen/config pi-gen/pi-gen-repo/config
          rm -rf pi-gen/pi-gen-repo/stage-logfalcon
          cp -r pi-gen/stage-logfalcon pi-gen/pi-gen-repo/stage-logfalcon

          # Copy project source into pi-gen so scripts can access it
          rm -rf pi-gen/pi-gen-repo/logfalcon-src
          rsync -a --exclude='.git' --exclude='pi-gen' \
              ./ pi-gen/pi-gen-repo/logfalcon-src/

          # Skip desktop stages (safety net — STAGE_LIST already limits stages)
          touch pi-gen/pi-gen-repo/stage3/SKIP pi-gen/pi-gen-repo/stage3/SKIP_IMAGES
          touch pi-gen/pi-gen-repo/stage4/SKIP pi-gen/pi-gen-repo/stage4/SKIP_IMAGES
          touch pi-gen/pi-gen-repo/stage5/SKIP pi-gen/pi-gen-repo/stage5/SKIP_IMAGES

          # Don't export images from intermediate stages
          touch pi-gen/pi-gen-repo/stage2/SKIP_IMAGES

      - name: Build image
        run: |
          cd pi-gen/pi-gen-repo
          ./build-docker.sh
        env:
          CLEAN: 1
          CONTINUE: 0
          PRESERVE_CONTAINER: 0

      - name: Shrink and compress image
        run: |
          ls -la pi-gen/pi-gen-repo/deploy/ || true
          cd pi-gen/pi-gen-repo/deploy

          IMAGE_FILE=$(ls *.img 2>/dev/null | head -1)
          if [ -z "$IMAGE_FILE" ]; then
            echo "::error::No .img file found in deploy directory"
            exit 1
          fi

          # Install PiShrink — removes free space from the filesystem before
          # compression, typically cuts another 30-50% off the final .xz size.
          wget -qO /usr/local/bin/pishrink.sh \
            https://raw.githubusercontent.com/Drewsif/PiShrink/master/pishrink.sh
          chmod +x /usr/local/bin/pishrink.sh

          RAW_SIZE=$(du -h "$IMAGE_FILE" | cut -f1)
          echo "Raw image:      $RAW_SIZE  ($IMAGE_FILE)"

          sudo /usr/local/bin/pishrink.sh "$IMAGE_FILE"
          SHRUNK_SIZE=$(du -h "$IMAGE_FILE" | cut -f1)
          echo "After PiShrink: $SHRUNK_SIZE  ($IMAGE_FILE)"

          # -9 = highest preset; -T0 = all CPU threads; drop -e (extreme) to save
          # ~5-10 min with negligible size difference on a typical Pi image.
          xz -9 -T0 "$IMAGE_FILE"
          FINAL_SIZE=$(du -h "${IMAGE_FILE}.xz" | cut -f1)
          echo "Compressed:     $FINAL_SIZE  (${IMAGE_FILE}.xz)"

          # Write a human-readable summary to the job summary
          echo "## Image sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Raw .img | $RAW_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| After PiShrink | $SHRUNK_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Final .img.xz | $FINAL_SIZE |" >> "$GITHUB_STEP_SUMMARY"

          echo "IMAGE_NAME=${IMAGE_FILE}.xz" >> "$GITHUB_ENV"
          echo "IMAGE_PATH=pi-gen/pi-gen-repo/deploy/${IMAGE_FILE}.xz" >> "$GITHUB_ENV"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') != true
        uses: actions/upload-artifact@v4
        with:
          name: logfalcon-image
          path: ${{ env.IMAGE_PATH }}
          retention-days: 7

      - name: Create release and upload image
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.IMAGE_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
